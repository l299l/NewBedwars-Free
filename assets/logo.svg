<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </radialGradient>
    <linearGradient id="headboard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff5533"/>
      <stop offset="100%" stop-color="#cc1100"/>
    </linearGradient>
    <linearGradient id="blanket" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dd2222"/>
      <stop offset="100%" stop-color="#991111"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff3333" stop-opacity="0"/>
      <stop offset="25%" stop-color="#ff3333"/>
      <stop offset="75%" stop-color="#ff8844"/>
      <stop offset="100%" stop-color="#ff8844" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#ff3333" flood-opacity="0.7"/>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="26" flood-color="#ff2222" flood-opacity="0.25"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="72" fill="url(#bg)"/>

  <!-- Soft ambient glow behind bed -->
  <ellipse cx="256" cy="230" rx="160" ry="100" fill="#ff2200" opacity="0.05" filter="url(#softGlow)"/>

  <!-- Corner accent brackets -->
  <polyline points="30,72 30,30 72,30" fill="none" stroke="#ff4433" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
  <polyline points="440,30 480,30 480,72" fill="none" stroke="#ff8844" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
  <polyline points="30,440 30,480 72,480" fill="none" stroke="#ff8844" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
  <polyline points="440,480 480,480 480,440" fill="none" stroke="#ff4433" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>

  <!-- Headboard (left, tall) -->
  <rect x="96" y="118" width="52" height="172" rx="9" fill="url(#headboard)" filter="url(#glow)"/>
  <rect x="96" y="116" width="52" height="6" rx="3" fill="#ff7755" opacity="0.9"/>

  <!-- Footboard (right, shorter) -->
  <rect x="364" y="160" width="52" height="130" rx="9" fill="url(#headboard)" filter="url(#glow)"/>
  <rect x="364" y="158" width="52" height="6" rx="3" fill="#ff7755" opacity="0.9"/>

  <!-- Bed frame base -->
  <rect x="96" y="270" width="320" height="20" rx="5" fill="#1a0505" filter="url(#shadow)"/>

  <!-- Mattress -->
  <rect x="148" y="200" width="216" height="70" rx="8" fill="#881010"/>
  <!-- Blanket -->
  <rect x="148" y="200" width="216" height="46" rx="7" fill="url(#blanket)"/>
  <!-- Blanket fold -->
  <line x1="148" y1="246" x2="364" y2="246" stroke="#ff5533" stroke-width="1.5" opacity="0.3"/>
  <!-- Blanket stripe -->
  <rect x="148" y="224" width="216" height="7" rx="3" fill="#ff6644" opacity="0.18"/>

  <!-- Pillows -->
  <rect x="160" y="207" width="82" height="26" rx="7" fill="#ffeedd" opacity="0.93" filter="url(#shadow)"/>
  <rect x="256" y="207" width="82" height="26" rx="7" fill="#ffe0cc" opacity="0.76" filter="url(#shadow)"/>

  <!-- Legs -->
  <rect x="116" y="289" width="20" height="40" rx="4" fill="#5c2a1a"/>
  <rect x="376" y="289" width="20" height="40" rx="4" fill="#5c2a1a"/>

  <!-- Horizontal accent line below bed -->
  <rect x="72" y="332" width="368" height="2" rx="1" fill="url(#accentLine)" opacity="0.35"/>

  <!-- Text -->
  <text x="256" y="415" font-family="'Segoe UI Black', 'Arial Black', Impact, sans-serif"
        font-size="48" font-weight="900" fill="#ffffff"
        text-anchor="middle" letter-spacing="2" opacity="0.95">NEW</text>
  <text x="256" y="462" font-family="'Segoe UI', Arial, sans-serif"
        font-size="23" font-weight="700" fill="#ff4433"
        text-anchor="middle" letter-spacing="10" opacity="0.9">BEDWARS</text>
</svg>
