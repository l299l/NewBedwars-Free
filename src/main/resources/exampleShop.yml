# =====================================================
#  NewBedwars — Example Shop GUI
#
#  This file is copied to plugins/NewBedwars/data/guis/exampleShop.yml on first start.
#  Edit the copy there; changes here only apply to fresh installs.
#
#  GuiId       — unique identifier used in DefaultTeamShopGui
#  GuiClass    — must be ShopGUI for shop/upgrade menus
#  GuiName     — display name shown at the top of the inventory
#  Size        — inventory size (must be a multiple of 9, max 54)
#  HeaderSize  — number of slots reserved as the category/header row area
#  FooterSize  — number of slots reserved as the footer row area
#
#  Slot values:
#    ci:<id>        — custom item (defined in en.yml CustomItemsNames)
#    category:<id>  — category button (opens that category's item list)
#    fill           — decorative filler item (defined by Fill key)
#    empty          — leave the slot empty
# =====================================================

GuiId: exampleShop
GuiClass: ShopGUI
GuiName: "Example Shop"
Size: 54
CloseOnTransaction: true

Fill: ci:fill
Empty: empty
HeaderSize: 18
FooterSize: 9

# Slots 20-26 and 29-35 below are the DEFAULT home-page fast-buy grid (used until a
# player customizes their own fast-buy via the profile GUI / "Reset All"). Each column
# lines up with the category buttons in slots 2-8 (blocks, tools, weapons, armor, bow,
# potions, misc, in that order) — keep items in the column matching their category if
# you edit this, or the home page will show e.g. swords under the "tools" icon.
# NOTE: these YAML keys are 1-indexed but map to 0-indexed inventory slots (key N ->
# slot N-1, see GuiDataYaml#L92-93)
Slots:
  1: category:home
  2: category:blocks
  3: category:tools
  4: category:weapons
  5: category:armor
  6: category:bow
  7: category:potions
  8: category:misc
  9: empty
