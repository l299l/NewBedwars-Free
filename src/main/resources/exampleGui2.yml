# =====================================================
#  NewBedwars — Example Upgrade GUI
#
#  This file is copied to plugins/NewBedwars/guis/ on first start.
#  Edit the copy there; changes here only apply to fresh installs.
#
#  Slot values:
#    upg:<upgrade>  — upgrade item (e.g. upg:protection, upg:sharpness)
#    cat:<id>       — category button (e.g. cat:traps)
#    fill           — decorative filler item
#    empty          — leave the slot empty
#
#  Available upgrades: protection, sharpness, haste, forge, healpool,
#                      dragonbuff, alarmtrap, blindtrap, miningfatiguetrap
# =====================================================

