# =====================================================
#  NewBedwars — Example Upgrade GUI
#
#  This file is copied to plugins/NewBedwars/data/guis/exampleUpgrade.yml on first start.
#  Edit the copy there; changes here only apply to fresh installs.
#
#  Slot values:
#    upg:<upgrade>  — upgrade item (e.g. upg:protection, upg:sharpness)
#    cat:<id>       — category button (e.g. cat:traps, cat:home)
#    fill           — decorative filler item
#    empty          — leave the slot empty
#
#  Available upgrades: protection, sharpness, haste, forge, healpool,
#                      dragonbuff, alarmtrap, blindtrap, miningfatiguetrap
#
#  Layout: row 0 (slots 2-3) has quick-access buttons for Home and Traps — always
#  visible, on every page, since the header renders unchanged everywhere. Row 1 is a
#  plain border. The two content rows hold the 6 direct-buy upgrades, centered and
#  bordered; the third content row is a plain divider. The footer repeats the Home
#  button centered, so there's always a way back out of the Traps category page.
# =====================================================

GuiId: exampleUpgrade
GuiClass: ShopGUI
GuiName: "Example Upgrade"
Size: 54
CloseOnTransaction: true

